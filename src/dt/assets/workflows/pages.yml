name: Publish viewer

on:
  push:
    branches: ["main"]
    paths:
      - "decisions/**"
      - "docs/**"
      - "README.md"
      - "RUNBOOK.md"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "decisions/**"
      - "docs/**"
      - "README.md"
      - "RUNBOOK.md"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Decision Tracker
        run: python -m pip install decision-tracker

      - name: Validate decisions
        run: dt validate --all

      - name: Generate reports
        run: dt report

      - name: Build static viewer site
        run: dt build-site --root .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
